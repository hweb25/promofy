plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // Firebase
    id "com.google.gms.google-services"
}

android {
    namespace = "com.promofy.app"
    compileSdk = 35
    ndkVersion = "25.1.8937393"

    compileOptions {
        // Required for flutter_local_notifications
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.promofy.app"
        // Firebase BoM 33.x requires API 23+; keep this explicit so the
        // manifest merge doesn't fail on the default flutter.minSdkVersion.
        minSdk = 23
        targetSdk = 34
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            storeFile file("promofy-keystore.jks")
            storePassword "promofy123"
            keyAlias "promofy"
            keyPassword "promofy123"
        }
    }

    buildTypes {
        release {
            // Stable signing key (committed) so every cloud build shares one
            // signature and installs over the previous one — no uninstall needed.
            signingConfig = signingConfigs.release
        }
    }
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"

    // Firebase BoM
    implementation platform("com.google.firebase:firebase-bom:33.7.0")
    implementation "com.google.firebase:firebase-analytics"
    implementation "com.google.firebase:firebase-messaging"
}

flutter {
    source = "../.."
}
