name: Build Android APK

# Builds a release APK in a clean cloud environment (sidesteps local Gradle
# loopback/SDK issues) and publishes it as a downloadable GitHub Release asset.

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Ensure pinned NDK is available
        # build.gradle pins ndkVersion 25.1.8937393; install it up front so
        # Gradle never blocks on it. Non-fatal if already present / not needed.
        run: yes | sdkmanager "ndk;25.1.8937393" >/dev/null 2>&1 || true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: promofy-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Publish APK to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Promofy APK build ${{ github.run_number }}
          body: |
            Automated release build of the Promofy Android app.

            Download **app-release.apk** below and open it on your Android phone.
            You'll need to allow "install from unknown sources" the first time.
          files: mobile/build/app/outputs/flutter-apk/app-release.apk
